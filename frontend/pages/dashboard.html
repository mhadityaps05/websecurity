<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../src/output.css" />
  </head>
  <body class="page-surface">
    <header class="page-header">
      <div>
        <span class="page-kicker">Overview</span>
        <h2 class="page-title">Dashboard</h2>
      </div>
      <span class="header-pill">Live</span>
    </header>

    <section class="panel risk-panel">
      <div class="risk-grid">
        <div class="risk-ring">
          <svg class="h-32 w-32 -rotate-90">
            <circle
              cx="64"
              cy="64"
              r="58"
              stroke="rgba(255,255,255,0.1)"
              stroke-width="8"
              fill="none"
            />
            <circle
              id="progressCircle"
              cx="64"
              cy="64"
              r="58"
              stroke="#10b981"
              stroke-width="8"
              fill="none"
              stroke-linecap="round"
              stroke-dasharray="364.4"
              stroke-dashoffset="364.4"
              class="transition-all duration-500 ease-out"
            />
          </svg>
          <div class="absolute text-center">
            <div class="risk-score" id="score">0</div>
            <div class="risk-score-caption">Score</div>
          </div>
        </div>

        <div>
          <div class="risk-label" id="scoreLabel">Safe</div>
          <p class="risk-copy" id="message">-</p>
        </div>
      </div>
    </section>

    <section class="panel detail-panel">
      <div class="detail-block">
        <span class="section-label">Reasons</span>
        <ul id="reasonsList" class="reason-list">
          <li class="muted-copy">Loading...</li>
        </ul>
      </div>

      <div class="detail-block">
        <span class="section-label">Website</span>
        <p id="websiteUrl" class="url-chip">-</p>
      </div>
    </section>

    <script src="../js/dashboard.js"></script>
  </body>
</html>
