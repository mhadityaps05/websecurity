<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../src/output.css" />
  </head>
  <body class="bg-transparent text-white p-4">
    <h2 class="text-xl font-bold mb-4">Dashboard</h2>

    <div class="bg-white/10 rounded-lg p-4 mb-4">
      <div class="text-center">
        <!-- Circular Progress Bar -->
        <div class="relative inline-flex items-center justify-center">
          <!-- SVG Circle Progress -->
          <svg class="w-32 h-32 transform -rotate-90">
            <circle
              cx="64"
              cy="64"
              r="58"
              stroke="rgba(255,255,255,0.1)"
              stroke-width="8"
              fill="none"
            />
            <circle
              id="progressCircle"
              cx="64"
              cy="64"
              r="58"
              stroke="#10b981"
              stroke-width="8"
              fill="none"
              stroke-linecap="round"
              stroke-dasharray="364.4"
              stroke-dashoffset="364.4"
              class="transition-all duration-500 ease-out"
            />
          </svg>
          <!-- Score Text di tengah -->
          <div class="absolute text-center">
            <div class="text-3xl font-bold" id="score">0</div>
          </div>
        </div>
        <!-- Label tambahan -->
        <div class="mt-2 text-sm opacity-70" id="scoreLabel">Low Risk</div>
      </div>
    </div>

    <div class="bg-white/10 rounded-lg p-4">
      <div class="mb-3">
        <span class="font-semibold">Message:</span>
        <p id="message" class="text-sm mt-1">-</p>
      </div>

      <div>
        <span class="font-semibold">Reasons:</span>
        <ul id="reasonsList" class="text-sm mt-2 space-y-1">
          <li class="opacity-50">Loading...</li>
        </ul>
      </div>

      <div class="mt-3">
        <span class="font-semibold">Website:</span>
        <p id="websiteUrl" class="text-sm mt-1 break-all text-blue-300">-</p>
      </div>
    </div>

    <script src="../js/dashboard.js"></script>
  </body>
</html>
