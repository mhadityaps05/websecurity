<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../src/output.css" />
  </head>
  <body class="bg-transparent text-white p-4">
    <h2 class="text-xl font-bold mb-4">Scan History</h2>

    <div class="flex gap-2 mb-4">
      <button
        class="filter-btn px-3 py-1 bg-white/20 rounded-full text-sm"
        data-filter="all"
      >
        All
      </button>
      <button
        class="filter-btn px-3 py-1 bg-white/10 rounded-full text-sm"
        data-filter="safe"
      >
        Safe
      </button>
      <button
        class="filter-btn px-3 py-1 bg-white/10 rounded-full text-sm"
        data-filter="suspicious"
      >
        Suspicious
      </button>
      <button
        class="filter-btn px-3 py-1 bg-white/10 rounded-full text-sm"
        data-filter="danger"
      >
        Danger
      </button>
    </div>

    <div class="space-y-2" id="historyList">
      <div class="text-center opacity-70 py-8">Loading...</div>
    </div>

    <!-- Tombol Clear History -->
    <button
      id="clearHistoryBtn"
      class="w-full mt-4 bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg transition"
    >
      Clear All History
    </button>

    <script src="../js/history.js"></script>
  </body>
</html>
