<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../src/output.css" />
  </head>
  <body class="page-surface">
    <header class="page-header">
      <div>
        <span class="page-kicker">Timeline</span>
        <h2 class="page-title">Scan History</h2>
      </div>
      <span class="header-pill">100 max</span>
    </header>

    <div class="filter-bar">
      <button class="filter-btn is-active" data-filter="all">
        All
      </button>
      <button class="filter-btn" data-filter="safe">
        Safe
      </button>
      <button class="filter-btn" data-filter="suspicious">
        Suspicious
      </button>
      <button class="filter-btn" data-filter="danger">
        Danger
      </button>
    </div>

    <div class="list-stack" id="historyList">
      <div class="empty-state">Loading...</div>
    </div>

    <button
      id="clearHistoryBtn"
      class="action-button action-danger mt-3"
    >
      Clear All History
    </button>

    <script src="../js/history.js"></script>
  </body>
</html>
