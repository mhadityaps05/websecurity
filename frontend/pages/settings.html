<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../src/output.css" />
  </head>
  <body class="page-surface">
    <header class="page-header">
      <div>
        <span class="page-kicker">Control</span>
        <h2 class="page-title">Settings</h2>
      </div>
      <span class="header-pill">Local</span>
    </header>

    <div class="settings-stack">
      <section class="panel settings-panel">
        <h3 class="settings-title">Notifications</h3>

        <label class="setting-row">
          <span class="setting-label">Enable notifications</span>
          <input
            id="notificationsEnabled"
            type="checkbox"
            class="toggle"
            checked
          />
        </label>

        <label class="setting-row">
          <span class="setting-label">Sound alerts</span>
          <input id="soundAlerts" type="checkbox" class="toggle" />
        </label>

        <label class="setting-row">
          <span class="setting-label">Desktop notifications</span>
          <input
            id="desktopNotifications"
            type="checkbox"
            class="toggle"
            checked
          />
        </label>
      </section>

      <section class="panel settings-panel">
        <h3 class="settings-title">Scan Options</h3>

        <label class="setting-row">
          <span class="setting-label">Auto-scan new pages</span>
          <input id="autoScan" type="checkbox" class="toggle" checked />
        </label>
      </section>

      <section class="panel settings-panel danger-panel">
        <h3 class="settings-title text-red-200">Danger Zone</h3>

        <button id="clearAllData" class="action-button action-danger mb-2">
          Clear All Data
        </button>

        <button
          id="resetExtension"
          class="action-button border border-red-400/40 bg-transparent text-red-100 hover:bg-red-500/15"
        >
          Reset Extension
        </button>
      </section>

      <p id="settingsStatus" class="card-meta" role="status"></p>
    </div>

    <script src="../js/settings.js"></script>
  </body>
</html>
